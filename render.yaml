services:
  - type: web
    name: collabconnect-api
    env: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: node index.js
    rootDir: server
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGIN
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
